<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: A Origem do Mal</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #d4af37; 
            --success: #27ae60; 
            --error: #c0392b; 
            --bg: #1a1a1a;
            --card: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #333;
        }

        #quiz-container { 
            width: 90%; 
            max-width: 500px; 
            background: var(--card); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            text-align: center;
        }

        .step { display: none; animation: slideIn 0.4s ease-out; }
        .active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.4em; }

        .options-grid { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }

        .opt-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: left;
        }

        /* Cores de Feedback Imediato */
        .correct-blink { background-color: var(--success) !important; color: white !important; border-color: #1e8449 !important; }
        .error-blink { background-color: var(--error) !important; color: white !important; border-color: #922b21 !important; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s;
        }

        .result-box { padding: 20px; background: #f9f9f9; border-radius: 12px; margin: 20px 0; text-align: left; }
        .hidden { display: none; }
        
        .admin-btn { background: none; border: none; color: #999; font-size: 12px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div id="step-name" class="step active">
        <h2>Bem-vindo ao Estudo</h2>
        <p>Para começar, como podemos te chamar?</p>
        <input type="text" id="user-name" placeholder="Seu nome completo">
        <button onclick="startQuiz()" style="margin-top:20px; background: var(--primary); color:white; padding:15px; width:100%; border-radius:10px; border:none; cursor:pointer; font-weight:bold;">COMEÇAR ESTUDO</button>
    </div>

    <div id="question-steps"></div>

    <div id="step-finish" class="step">
        <h2 style="font-style: italic;">"Lâmpada para os meus pés é a tua palavra e luz para o meu caminho."</h2>
        <p>(Salmos 119:105)</p>
        <div class="result-box" id="final-summary"></div>
        <button onclick="location.reload()" style="background: var(--primary); color:white; padding:15px; width:100%; border-radius:10px; border:none; cursor:pointer;">RECOMEÇAR</button>
        <button class="admin-btn" onclick="accessAdmin()">Painel Admin</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "Como era o céu antes do pecado?", opts: ["Um lugar de regras rígidas e medo", "Um lugar de perfeita harmonia, paz e adoração", "Um lugar com discórdia controlada"], ans: 1 },
        { q: "Quais são os anjos relacionados à adoração e pureza?", opts: ["Querubins", "Mensageiros", "Serafins"], ans: 2 },
        { q: "Quem é Miguel, o Arcanjo, em Sua função real?", opts: ["Um anjo de terceira ordem", "Cristo, o Comandante dos anjos", "Um ser criado por Gabriel"], ans: 1 },
        { q: "Lúcifer era um Querubim ungido para:", opts: ["Criar novos mundos", "Cobrir e guardar a Glória de Deus", "Destruir os ímpios"], ans: 1 },
        { q: "O pecado nasceu em Lúcifer por causa do:", opts: ["Cansaço de servir", "Orgulho e desejo de ser igual a Deus", "Desejo de conhecer a Terra"], ans: 1 },
        { q: "Em Apocalipse 12:7, a batalha foi entre:", opts: ["Miguel/Anjos vs Dragão/Anjos", "Humanos vs Gigantes", "Anjos vs Natureza"], ans: 0 },
        { q: "Por que Deus não destruiu Lúcifer na hora?", opts: ["Não tinha poder", "Para o universo ver os frutos da rebelião", "Lúcifer pediu perdão"], ans: 1 },
        { q: "Em quantos dias literais Deus fez o mundo?", opts: ["6 dias de trabalho e 1 de descanso", "7 dias de trabalho", "Milhões de anos"], ans: 0 },
        { q: "Adão e Eva foram criados para serem:", opts: ["Escravos no Éden", "Administradores e testemunhas do conflito", "Anjos de carne e osso"], ans: 1 },
        { q: "Quem foi o representante por onde o pecado entrou no mundo?", opts: ["A Serpente", "Adão", "Caim"], ans: 1 },
        { q: "Qual a sentença final do homem pecador?", opts: ["Viver na lua", "Trabalho penoso e morte física", "Reencarnação"], ans: 1 },
        { q: "Onde Deus ensina o caminho da Redenção?", opts: ["Nas estrelas", "No Santuário", "Nos sonhos"], ans: 1 }
    ];

    let currentStep = -1; 
    let score = 0;
    let userName = "";
    let userReport = [];

    function startQuiz() {
        userName = document.getElementById('user-name').value;
        if(!userName.trim()) return alert("Por favor, digite seu nome.");
        
        currentStep = 0;
        document.getElementById('step-name').classList.remove('active');
        renderQuestion();
    }

    function renderQuestion() {
        const container = document.getElementById('question-steps');
        const item = quizData[currentStep];
        const progress = ((currentStep + 1) / quizData.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";

        container.innerHTML = `
            <div class="step active">
                <p style="color:#888; font-weight:bold;">Questão ${currentStep + 1} de ${quizData.length}</p>
                <h2>${item.q}</h2>
                <div class="options-grid">
                    ${item.opts.map((opt, i) => `
                        <button class="opt-btn" onclick="checkAnswer(this, ${i})">${opt}</button>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function checkAnswer(btn, selectedIdx) {
        const correctIdx = quizData[currentStep].ans;
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        const isCorrect = selectedIdx === correctIdx;
        const textSelected = quizData[currentStep].opts[selectedIdx];
        
        if(isCorrect) {
            btn.classList.add('correct-blink');
            score++;
            userReport.push(`✅ Q${currentStep+1}: Correta (${textSelected})`);
        } else {
            btn.classList.add('error-blink');
            allBtns[correctIdx].classList.add('correct-blink'); // Mostra a certa pra ele aprender
            userReport.push(`❌ Q${currentStep+1}: ERROU (Marcou: ${textSelected})`);
        }

        setTimeout(() => {
            currentStep++;
            if(currentStep < quizData.length) {
                renderQuestion();
            } else {
                finishQuiz();
            }
        }, 1500); // Espera 1.5s para o aluno ver a cor antes de mudar
    }

    function finishQuiz() {
        document.getElementById('question-steps').innerHTML = "";
        document.getElementById('step-finish').classList.add('active');
        document.getElementById('progress-fill').style.width = "100%";
        
        const summary = document.getElementById('final-summary');
        summary.innerHTML = `
            <p><strong>Estudante:</strong> ${userName}</p>
            <p><strong>Acertos:</strong> ${score} de ${quizData.length}</p>
            <hr>
            <small>${userReport.join('<br>')}</small>
        `;

        // Enviar para Formspree de forma super detalhada
        fetch('https://formspree.io/f/mojkedld', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                Estudante: userName,
                Resultado_Final: `${score} de ${quizData.length}`,
                Relatorio_Detalhado: userReport
            })
        });

        // Guardar no local para o Admin
        let history = JSON.parse(localStorage.getItem('bible_slides_history') || '[]');
        history.push({ name: userName, score, date: new Date().toLocaleString(), report: userReport });
        localStorage.setItem('bible_slides_history', JSON.stringify(history));
    }

    function accessAdmin() {
        if(prompt("Senha do Admin:") === "GondeBiblia") {
            const data = JSON.parse(localStorage.getItem('bible_slides_history') || '[]');
            alert("Registros nesta máquina: " + data.length + "\nVerifique seu e-mail para detalhes completos.");
        }
    }
</script>

</body>
</html>
