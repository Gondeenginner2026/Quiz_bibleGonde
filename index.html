<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: O Grande Conflito e a Origem do Mal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --error: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        #quiz-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .question-block { margin-bottom: 25px; padding: 20px; border: 2px solid #eee; border-radius: 10px; transition: 0.4s; position: relative; }
        
        .correct { box-shadow: 0 0 15px rgba(39, 174, 96, 0.4); border-color: var(--success) !important; background: #f1f9f4; }
        .wrong { box-shadow: 0 0 15px rgba(192, 57, 43, 0.4); border-color: var(--error) !important; background: #fff5f5; }
        
        .options label { display: block; margin: 8px 0; padding: 12px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #eef0f2; }
        .locked { pointer-events: none; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        #completion-msg { text-align: center; border: 2px dashed var(--accent); padding: 20px; margin: 20px 0; border-radius: 10px; background: #fffcf9; }
        .admin-section { margin-top: 50px; border-top: 2px solid #ddd; padding-top: 20px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #f4f4f4; color: var(--primary); }
    </style>
</head>
<body>

<div id="quiz-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 id="quiz-title">A Origem do Mal</h1>
        <p>Estudo bíblico sobre o início do Grande Conflito</p>
    </div>

    <div id="questions-area"></div>

    <div id="user-info" class="question-block">
        <h3>Insira seu nome para concluir:</h3>
        <input type="text" id="user-name" placeholder="Seu nome completo" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">
    </div>

    <button id="btn-submit" onclick="submitQuiz()">ENVIAR RESPOSTAS</button>

    <div id="completion-msg" class="hidden">
        <h2 style="font-style: italic; color: var(--primary);">"Lâmpada para os meus pés é a tua palavra e luz para o meu caminho."</h2>
        <p>(Salmos 119:105)</p>
        <hr>
        <p><strong>PARABÉNS! VOCÊ TERMINOU O QUIZ!</strong></p>
        <button onclick="showResults()" style="background: var(--success);">VER MEU RESULTADO</button>
    </div>

    <div id="results-summary" class="hidden" style="text-align:center; font-size: 20px; margin: 20px; font-weight: bold; color: var(--primary);"></div>

    <div class="admin-section">
        <button id="btn-admin-access" onclick="accessAdmin()" style="background: #7f8c8d; width: auto; padding: 8px 15px;">Painel Administrativo</button>
        <div id="admin-panel" class="hidden">
            <h3>Relatório de Estudantes</h3>
            <div id="admin-content" style="overflow-x: auto;"></div>
            <h3>Análise de Dificuldade (Erros)</h3>
            <div id="stats-content"></div>
        </div>
    </div>
</div>

<script>
const quizData = [
    { q: "Como era o céu antes do pecado?", opts: ["Um lugar de regras rígidas e medo", "Um lugar de perfeita harmonia, paz e adoração", "Um lugar com discórdia controlada"], ans: 1 },
    { q: "Quais são os anjos relacionados à adoração e pureza (Isaías 6:2)?", opts: ["Querubins", "Mensageiros", "Serafins"], ans: 2 },
    { q: "Quem é Miguel, o Arcanjo, mencionado em Judas 1:9 e Daniel 12:1?", opts: ["O principal dos anjos criados", "Cristo em Sua função de Comandante", "Um anjo mensageiro como Gabriel"], ans: 1 },
    { q: "Qual era a função de Lúcifer como 'Querubim Ungido'?", opts: ["Anunciar boas novas", "Cobrir e guardar a Glória de Deus", "Cuidar da natureza"], ans: 1 },
    { q: "Qual foi a raiz da rebelião de Lúcifer no coração?", opts: ["Desejo de conhecer a Terra", "Orgulho e desejo de ser igual a Deus", "Cansaço de servir"], ans: 1 },
    { q: "Contra quem foi a batalha descrita em Apocalipse 12:7-9?", opts: ["Miguel e seus anjos vs Dragão e seus anjos", "Anjos vs Seres Humanos", "Gabriel vs Lúcifer"], ans: 0 },
    { q: "Por que Deus não destruiu Lúcifer imediatamente?", opts: ["Porque Lúcifer era mais forte", "Para que o universo visse as consequências do pecado e obedecesse por amor", "Porque Deus não faz julgamentos"], ans: 1 },
    { q: "Em quantos dias Deus criou o nosso mundo e descansou?", opts: ["Criou em 6 dias literais e descansou no 7º", "Criou em 1 dia e descansou 6", "Levou milhões de anos"], ans: 0 },
    { q: "Segundo o estudo, por que Deus criou Adão e Eva?", opts: ["Para substituir os anjos caídos", "Para serem administradores da criação e testemunhas do conflito", "Para morarem no céu imediatamente"], ans: 1 },
    { q: "Através de quem o pecado entrou na raça humana (Representante)?", opts: ["Eva", "Adão", "Caim"], ans: 1 },
    { q: "Qual foi a sentença dada ao Homem (Adão) após o pecado?", opts: ["Rastejar sobre a terra", "Trabalho penoso, fadiga e morte física", "Dor no parto"], ans: 1 },
    { q: "Qual é o lugar onde Deus ensina o caminho da Redenção (Salmo 77:13)?", opts: ["No deserto", "No Santuário", "No Monte Sinai"], ans: 1 }
];

function renderQuiz() {
    const area = document.getElementById('questions-area');
    quizData.forEach((item, i) => {
        area.innerHTML += `
            <div class="question-block" id="q-block-${i}">
                <p><strong>${i+1}. ${item.q}</strong></p>
                <div class="options" id="opts-${i}">
                    ${item.opts.map((opt, optIdx) => `
                        <label><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>
                    `).join('')}
                </div>
            </div>`;
    });
}

function submitQuiz() {
    const name = document.getElementById('user-name').value;
    if(!name.trim()) return alert("Por favor, digite seu nome!");
    
    document.querySelectorAll('.question-block').forEach(b => b.classList.add('locked'));
    document.getElementById('btn-submit').classList.add('hidden');
    document.getElementById('user-info').classList.add('hidden');
    document.getElementById('completion-msg').classList.remove('hidden');

    saveToHistory(name);
}

function showResults() {
    let score = 0;
    quizData.forEach((item, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`)?.value;
        const block = document.getElementById(`q-block-${i}`);
        
        if (parseInt(selected) === item.ans) {
            score++;
            block.classList.add('correct');
        } else {
            block.classList.add('wrong');
        }
    });
    document.getElementById('results-summary').innerHTML = `Resultado: ${score} acertos de ${quizData.length}`;
    document.getElementById('results-summary').classList.remove('hidden');
    window.scrollTo(0, document.body.scrollHeight);
}

function saveToHistory(name) {
    let history = JSON.parse(localStorage.getItem('quiz_history_mal') || '[]');
    let answers = [];
    quizData.forEach((_, i) => {
        answers.push(document.querySelector(`input[name="q${i}"]:checked`)?.value || "n/a");
    });
    history.push({ name, answers, date: new Date().toLocaleString() });
    localStorage.setItem('quiz_history_mal', JSON.stringify(history));

    // Envio para Formspree conforme seu link
    fetch('https://formspree.io/f/mojkedld', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: name, respostas: answers, tema: "Origem do Mal" })
    });
}

function accessAdmin() {
    const pass = prompt("Digite a senha do administrador:");
    if (pass === "GondeBiblia") {
        document.getElementById('admin-panel').classList.remove('hidden');
        renderAdminData();
    } else {
        alert("Senha incorreta!");
    }
}

function renderAdminData() {
    const data = JSON.parse(localStorage.getItem('quiz_history_mal') || '[]');
    const content = document.getElementById('admin-content');
    const stats = document.getElementById('stats-content');
    
    if(data.length === 0) {
        content.innerHTML = "<p>Nenhum registro encontrado.</p>";
        return;
    }

    let table = `<table><tr><th>Data</th><th>Nome</th><th>Questões Erradas</th></tr>`;
    let errorCount = Array(quizData.length).fill(0);

    data.forEach(entry => {
        let userErrors = [];
        entry.answers.forEach((ans, i) => {
            if (parseInt(ans) !== quizData[i].ans) {
                userErrors.push(`Q${i+1}`);
                errorCount[i]++;
            }
        });
        table += `<tr><td>${entry.date}</td><td>${entry.name}</td><td>${userErrors.join(', ') || 'Nenhum'}</td></tr>`;
    });
    content.innerHTML = table + `</table>`;

    let statsHtml = "";
    errorCount.forEach((count, i) => {
        let percent = (count / data.length * 100).toFixed(1);
        statsHtml += `
            <div style="margin: 10px 0;">
                <small>Questão ${i + 1}: ${percent}% de erro</small>
                <div style="background:#eee; width:100%; height:8px; border-radius:4px;">
                    <div style="background:var(--error); width:${percent}%; height:8px; border-radius:4px;"></div>
                </div>
            </div>`;
    });
    stats.innerHTML = statsHtml;
}

renderQuiz();
</script>
</body>
</html>
